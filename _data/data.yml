experiences:
    title: Experiences
    info:
      - role: Software Developer / Software Architect
        time: 04/2024 – present
        company: CodeSolutions – Consultant for Smals
        details: |
          At Smals, I work on the development and maintenance of large-scale Angular applications, 
          applying modern frontend best practices and ensuring high standards in performance and maintainability. 
          I design and manage reusable web components using Angular Elements to improve modularity and consistency 
          across projects. I also implement and manage a backend-for-frontend (BFF) layer to optimize data flow 
          and API interactions between services.
          
          As Software Architect for the MAGS mobile application (*Mijn Gezondheid*), I define governance guidelines, 
          oversee the integration of web components into the Ionic-based mobile app, and maintain component documentation 
          through Storybook.
        tasks: |
          - Front-end and back-end development using Angular, Angular Elements, and Java
          - Design and implementation of reusable web components and BFF architecture
          - Integration of components within the MAGS mobile application (Ionic)
          - Define governance and architectural guidelines for consistency and quality
          - Maintain Storybook and documentation for shared components
          - Implement CI/CD, OAuth2, and API integrations
        environments: |
          Angular, Ionic, Typescript, Java, PostgreSQL, AWS, GitLab, GitHub, Atlassian, OpenShift 

      - role: Lead Front-End Developer
        time: 04/2023 – 04/2024
        company: Merapar – Consultant for Vlaamse Overheid & Telenet
        details: |
          As a consultant for Merapar, I led front-end development across two major projects: 
          one for the Flemish Government and another for Telenet. My work focused on creating 
          modern, cloud-ready Angular applications and establishing strong development pipelines. 
          
          At the Flemish Government, I developed an e-portal for individuals under electronic 
          monitoring, enabling self-service management of administrative tasks while reducing 
          workload for VCET staff. I also led the creation of an Angular component library, 
          styling PrimeNG components to match VO’s design system and publishing it to a private npm registry. 
          
          At Telenet, I contributed to the modernization of legacy applications, transforming 
          a JSP-based system into a dynamic Angular frontend with a Java backend, and managing 
          CI/CD pipelines and S3 deployments.
        tasks: |
          - Develop and maintain Angular frontends for enterprise applications
          - Lead UI/UX modernization and component design
          - Integrate authentication (OAuth2, OKTA, WEBIDM/ACM)
          - Build and maintain CI/CD pipelines and S3 deployments
          - Create and publish a reusable Angular component library
        environments: |
          Angular, Typescript, Java, PostgreSQL, AWS, GitLab, Atlassian

      - role: Software Developer / Lead Front-End Developer
        time: 01/2019 – 04/2023
        company: Assign – Consultant for Fairplay Casino’s, LKQ / Car-Systems B.V., and Unilogic
        details: |
          While working at Assign, I contributed to multiple large-scale projects across diverse domains, 
          including gaming, automotive, and education. My work spanned full-stack and lead front-end roles, 
          focusing on building scalable, maintainable web applications with modern frameworks. 

          At LKQ / Car-Systems B.V., I helped develop a comprehensive Garage Management System, 
          introducing new modules such as a time registration tool and integrating leasing systems like ROB. 
          I also enhanced the GMS frontend with Material UI and Storybook, ensuring a consistent and modern UI/UX.

          At Fairplay Casino’s, I led the front-end team in developing both Spanish and Dutch casino platforms, 
          adapting the existing product for compliance, localization, and new architectural standards.

          At Unilogic, I worked on the Dapto platform, an administrative system for schools, 
          where I contributed to the design and development of flexible data models and intuitive teacher tools.
        tasks: |
          - Front-end and full-stack development using React, Angular, PHP, and Node
          - UI/UX design and modernization (Material UI, Storybook)
          - Integration of external services and APIs (ROB, TecRMI, authentication)
          - Component-driven development and architecture setup
          - Team leadership, planning, and coordination
        environments: |
          React, Angular, Typescript, GoLang, PHP, Node, PostgreSQL, HTML, Sass, Atlassian, GitLab, Kubernetes, Helm

      - role: Full-Stack Developer / Data Protection Manager
        time: 2015 – 2018
        company: AppSaloon
        details: |
          I began at AppSaloon as a front-end developer focused on WordPress theming and WooCommerce integrations, 
          later expanding into full-stack development using Angular, React, and PHP. My role combined hands-on 
          development with client communication, translating customer needs into technical solutions and quotations. 
          I also contributed to UI/UX design and ensured GDPR compliance as Data Protection Manager.

          During my time at AppSaloon, I worked on a wide range of projects for clients across different industries:
          - **Modern Retail** – Collaborated with a U.S.-based company specializing in WooCommerce websites integrated 
            with in-store POS and stock systems. Focused on custom WooCommerce solutions and seamless data synchronization.  
          - **WPGDPR Core Plugin** – Developed a WordPress plugin enabling users to view, update, and request deletion of their personal data.  
          - **Colortally (Colorbreeze)** – Built an Angular application to validate and manage digital print color values.  
          - **WooCommerce Transportation Tool (Q Works)** – Designed and implemented a cost calculation tool for industrial construction logistics.  
          - **Aap Coco Na (Kellogg’s)** – Created a JavaScript-based browser game inspired by *Bop It*.
        tasks: |
          - Full-stack development using Angular, React, and PHP
          - WordPress theming and WooCommerce integrations
          - Client communication and requirements analysis
          - UI/UX implementation and theme customization
          - GDPR compliance and data protection management
        environments: |
          Angular, React, Redux, JavaScript, PHP, WordPress, WooCommerce, SCSS, Sass, Gulp, jQuery, Git, SVG

      - role: Teacher Web Development
        time: 2016 – 2018
        company: Syntra Genk
        details: |
          As a web development teacher, I instructed students in a range of programming languages including HTML, JavaScript, Angular, React, PHP, and CSS. 
          My focus was on nurturing their skills to become proficient developers. 
          Through coaching, I guided them in the practical aspects of programming, testing, and implementing designs to ensure a comprehensive understanding of web development concepts.
        tasks:
        projects:
        environments:

      - role: Project Manager / Coordinator & Teacher
        time: 2010 - 2015
        company: PXL
        details: |
          During my period at PXL, I was the project manager for a research initiative focused on Universal Design. This project involved the transformation of a listed 
          house into the UD Woonlabo, a dedicated space for exploring and implementing Universal Design principles.
        tasks: |
            - Manager UD Woonlabo (Participation in and organisation of the management committee and the administrative tasks associated with the project, both in the construction phase as during operational activities after opening)
            - Search for European and national support + follow-up of the files (EFRO-doelstelling 2 project with support from the province of Limburg and the city of Hasselt)
            - Promotion of UD Woonlabo and securing of investors (more than 30 partner companies found who donated materials)
            - Presentation of UD and UD Woonlabo at conferences including the Universal Design conference in Lund
            - Supervising the building process
            - Organising and leading focus groups
            - Coordinating research into Universal Design in the built environment
            - Guiding tours and organising events after completion (exhibitions, cooking workshops, dining in the dark, etc.)
            - Supervising interns
        projects:
        environments:

